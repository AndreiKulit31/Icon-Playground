<html>
    <head>
        <title> Menu </title>

        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    </head>
    <body>
        <!-- This explicitly forces exactly 4 equal columns and centers the entire grid -->
        <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">

            <!-- YOUR GRID DIV (Removed the top/bottom 50px margin so it centers perfectly) -->
            <div style="display: grid; grid-template-columns: repeat(4, max-content); gap: 16px; justify-content: center; justify-items: center; align-items: center; margin: auto;"> 

            <!-- ROW 1 -->
                <a href="/Error/index.html" aria-label="Error">
                    <span class="material-symbols-outlined error" style="opacity: 0.3;">error</span>
                </a>
                <a href="/Speed/index.html" aria-label="Speed">
                    <span class="material-symbols-outlined speed" style="opacity: 0.3;">speed</span>
                </a>
                <!-- #3: YOUR SPIN LINK -->
                <a href="/Spinning/index.html" aria-label="Spin">
                    <span class="material-symbols-outlined spin" style="opacity: 0.3;">refresh</span>
                </a>
                <a href="/Recycling/index.html" aria-label="Recycle">
                    <span class="material-symbols-outlined recycle" style="opacity: 0.3;">recycling</span>
                </a>
                <!-- ROW 2 -->
                <a href="/Faces/index.html" aria-label="Faces">
                    <span class="material-symbols-outlined face" style="opacity: 0.3;">sentiment_neutral</span>
                </a>
                <a href="/Turn (Clockwise)/index.html" aria-label="Turn Clockwise">
                    <span class="material-symbols-outlined turn_right" style="opacity: 0.3;">turn_right</span>
                </a>
                <a href="/Cycle/index.html" aria-label="Cycle">
                    <span class="material-symbols-outlined turn_right cycle" style="opacity: 0.3;">change_circle</span>
                </a>
                <a href="/Sun rotations/index.html" aria-label="Sun">
                    <span class="material-symbols-outlined sun" style="opacity: 0.3;">sunny</span>
                </a>
            
                <!-- ROW 3 -->
                <a href="/Letters/index.html" aria-label="Alphabet">
                    <span class="material-symbols-outlined turn_right alphabet" style="opacity: 0.3;">font_download</span>
                </a>
                <a href="/Wheelchair People/index.html" aria-label="Wheelchair">
                    <span class="material-symbols-outlined wheelchair" style="opacity: 0.3;">accessible</span>
                </a>
                <a href="/16 Checkboxes/index.html" aria-label="Checkboxes">
                    <span class="material-symbols-outlined checkbox" style="opacity: 0.3;">check_box</span>
                </a>
                <a href="/Counter/index.html" aria-label="Counter">
                    <span class="material-symbols-outlined counter" style="opacity: 0.3;">counter_1</span>
                </a>
            
                <!-- ROW 4 -->
                <a href="/Wifi/index.html" aria-label="Wifi">
                    <span class="material-symbols-outlined wifi" style="opacity: 0.3;">wifi</span>
                </a>
                <a href="/Battery/index.html" aria-label="Battery">
                    <span class="material-symbols-outlined battery" style="opacity: 0.3;">battery_3_bar</span>
                </a>
                <!-- #16: YOUR ARROW LINK -->
                <a href="/Arrows/index.html" aria-label="Arrows">
                    <span class="material-symbols-outlined arrow" style="opacity: 0.3;">arrow_upward</span>
                </a>
                <a href="/Gray BrokLets/index.html" aria-label="Gray Letters">
                    <span class="material-symbols-outlined gletter" style="opacity: 0.3;">a</span>
                </a>
            </div>
        </div>

    </body>
</html>
